name: 'Perform SAST scan'
description: 'Perform a SAST scan on Fortify on Demand'
author: 'Fortify'
runs:
  using: composite
  steps:
    - uses: fortify/github-action/internal/set-fod-var-defaults@714fe84b03a813fe8124e5ef4ce22da010ab1839
    - uses: fortify/github-action/setup@714fe84b03a813fe8124e5ef4ce22da010ab1839
      with:
        export-path: false
        fcli: action-default
    - uses: fortify/github-action/internal/fod-login@714fe84b03a813fe8124e5ef4ce22da010ab1839
    - uses: fortify/github-action/package@714fe84b03a813fe8124e5ef4ce22da010ab1839
    - uses: fortify/github-action/internal/run-script@714fe84b03a813fe8124e5ef4ce22da010ab1839
      with:
        script: fod-scan.sh
      env: 
        DO_SAST_SCAN: true # Not used for now
        GITHUB_TOKEN: ${{ github.token }}
    - if: env.DO_EXPORT == 'true'
      uses: fortify/github-action/fod-export@714fe84b03a813fe8124e5ef4ce22da010ab1839
        
branding:
  icon: 'shield'
  color: 'blue'

