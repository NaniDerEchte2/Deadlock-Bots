name: "🧱 Master Dashboard Auth Guardrails"

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
  schedule:
    - cron: "40 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  master-auth-guard:
    name: "🛡️ Master Dashboard Header/Auth Guard"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Start Master Dashboard Guard Server
        env:
          DEADLOCK_DB_PATH: ${{ github.workspace }}/.master-auth-guard/deadlock.sqlite3
          PYTHONPATH: ${{ github.workspace }}
          MASTER_NSSM_RESTART_ENABLED: "0"
          MASTER_DASHBOARD_ALLOW_QUERY_TOKEN: "0"
          MASTER_GUARD_HOST: "127.0.0.1"
          MASTER_GUARD_PORT: "8790"
          MASTER_GUARD_TOKEN: ${{ secrets.MASTER_GUARD_TOKEN }}
          MASTER_GUARD_SESSION_ID: ${{ secrets.MASTER_GUARD_SESSION_ID }}
          MASTER_GUARD_CSRF_TOKEN: ${{ secrets.MASTER_GUARD_CSRF_TOKEN }}
        run: |
          : "${MASTER_GUARD_TOKEN:?Set secret MASTER_GUARD_TOKEN}"
          : "${MASTER_GUARD_SESSION_ID:?Set secret MASTER_GUARD_SESSION_ID}"
          : "${MASTER_GUARD_CSRF_TOKEN:?Set secret MASTER_GUARD_CSRF_TOKEN}"
          mkdir -p .master-auth-guard
          python -m pip install --require-hashes -r requirements-locked.txt
          
          python .github/scripts/master_dashboard_auth_guard_server.py > master-dashboard-auth-guard.log 2>&1 &
          echo $! > master-dashboard-auth-guard.pid

      - name: Wait for Master Dashboard Readiness
        run: |
          COOKIE_HEADER="Cookie: master_dash_session=${MASTER_GUARD_SESSION_ID}"
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "$COOKIE_HEADER" \
              http://127.0.0.1:8790/api/auth/me || true)
            if [ "$code" = "200" ]; then
              echo "Master dashboard guard server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Master dashboard guard server did not become ready in time"
          cat master-dashboard-auth-guard.log || true
          exit 1

      - name: Verify Master Dashboard Auth Guardrails
        run: |
          request_json() {
            name="$1"
            expected="$2"
            shift 2
            tmp=$(mktemp)
            code=$(curl -sS -o "$tmp" -w "%{http_code}" "$@" || true)
            echo "$name -> HTTP $code" >&2
            if [ "$code" != "$expected" ]; then
              echo "::error::$name expected HTTP $expected but got $code" >&2
              cat "$tmp" >&2 || true
              rm -f "$tmp"
              exit 1
            fi
            cat "$tmp"
            rm -f "$tmp"
          }

          BASE_URL="http://127.0.0.1:8790"
          COOKIE_HEADER="Cookie: master_dash_session=${MASTER_GUARD_SESSION_ID}"
          JSON_HEADER="Content-Type: application/json"
          AUTH_HEADER="Authorization: Bearer ${MASTER_GUARD_TOKEN}"
          CSRF_HEADER="X-CSRF-Token: ${MASTER_GUARD_CSRF_TOKEN}"

          # Unauthenticated write request must be blocked.
          request_json "unauthenticated-restart-blocked" 401 \
            -X POST \
            -H "$JSON_HEADER" \
            --data '{}' \
            "$BASE_URL/api/bot/restart" > /dev/null

          # Query tokens must stay disabled (header token only).
          request_json "query-token-restart-blocked" 401 \
            -X POST \
            -H "$JSON_HEADER" \
            --data '{}' \
            "$BASE_URL/api/bot/restart?token=${MASTER_GUARD_TOKEN}" > /dev/null

          # Session auth + CSRF but missing origin/referer must fail.
          request_json "session-without-origin-blocked" 403 \
            -X POST \
            -H "$JSON_HEADER" \
            -H "$COOKIE_HEADER" \
            -H "$CSRF_HEADER" \
            --data '{}' \
            "$BASE_URL/api/bot/restart" > /dev/null

          # Wrong origin must fail.
          request_json "session-wrong-origin-blocked" 403 \
            -X POST \
            -H "$JSON_HEADER" \
            -H "$COOKIE_HEADER" \
            -H "Origin: https://evil.example" \
            -H "$CSRF_HEADER" \
            --data '{}' \
            "$BASE_URL/api/bot/restart" > /dev/null

          # Missing CSRF token must fail even with valid origin.
          request_json "session-missing-csrf-blocked" 403 \
            -X POST \
            -H "$JSON_HEADER" \
            -H "$COOKIE_HEADER" \
            -H "Origin: https://admin.earlysalty.de" \
            --data '{}' \
            "$BASE_URL/api/bot/restart" > /dev/null

          # Valid origin + csrf via session cookie must reach the handler (HTTP 200).
          # Note: ok/restart_mode not checked here - NSSM is unavailable in Linux CI.
          request_json "session-origin-csrf-allowed" 200 \
            -X POST \
            -H "$JSON_HEADER" \
            -H "$COOKIE_HEADER" \
            -H "Origin: https://admin.earlysalty.de" \
            -H "$CSRF_HEADER" \
            --data '{}' \
            "$BASE_URL/api/bot/restart" > /dev/null

          # Referer fallback (without Origin) should also reach the handler.
          request_json "session-referer-csrf-allowed" 200 \
            -X POST \
            -H "$JSON_HEADER" \
            -H "$COOKIE_HEADER" \
            -H "Referer: https://admin.earlysalty.de/admin" \
            -H "$CSRF_HEADER" \
            --data '{}' \
            "$BASE_URL/api/bot/restart" > /dev/null

          # Session auth me must expose csrf token.
          auth_session_resp=$(request_json "auth-me-session" 200 \
            -H "$COOKIE_HEADER" \
            "$BASE_URL/api/auth/me")
          RESP="$auth_session_resp" python - <<'PY'
          import json
          import os
          data = json.loads(os.environ["RESP"])
          assert data.get("authenticated") is True, data
          assert data.get("mode") == "discord", data
          expected = os.environ["MASTER_GUARD_CSRF_TOKEN"]
          assert data.get("csrf_token") == expected, data
          PY

      - name: Upload Master Guard Server Log
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: master-dashboard-auth-guard-log
          path: master-dashboard-auth-guard.log
          if-no-files-found: ignore

      - name: Stop Master Dashboard Guard Server
        if: always()
        run: |
          if [ -f master-dashboard-auth-guard.pid ]; then
            kill "$(cat master-dashboard-auth-guard.pid)" || true
          fi
