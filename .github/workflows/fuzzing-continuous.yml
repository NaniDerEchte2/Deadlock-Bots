name: "🧪 Continuous Fuzzing"

on:
  pull_request:
  push:
    branches: [ "main", "master", "develop" ]
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
jobs:
  protocol-fuzzing:
    name: "Protocol Fuzzing (fast-check)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Configure Fuzzing Depth
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "FUZZ_NUM_RUNS=10000" >> $GITHUB_ENV
          else
            echo "FUZZ_NUM_RUNS=2000" >> $GITHUB_ENV
          fi

      - name: Install Fuzzing Dependencies
        run: |
          npm ci --prefix cogs/steam/steam_presence --include=dev --ignore-scripts

      - name: Run Protocol Fuzzing
        run: |
          npm --prefix cogs/steam/steam_presence run fuzz:protocol
